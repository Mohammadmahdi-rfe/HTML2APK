<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>My App</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 24px;
  }
  .logo {
    font-size: 64px;
    filter: drop-shadow(0 0 20px rgba(99,102,241,.6));
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #818cf8, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
  }
  p.sub {
    font-size: 14px;
    color: #94a3b8;
    text-align: center;
    line-height: 1.6;
    max-width: 300px;
  }
  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 340px;
  }
  button {
    padding: 14px 10px;
    border: none;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: transform .12s, opacity .12s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  button:active { transform: scale(.93); opacity: .85; }
  button span.icon { font-size: 24px; }
  .btn-toast    { background: #6366f1; color: #fff; }
  .btn-vibrate  { background: #8b5cf6; color: #fff; }
  .btn-copy     { background: #0ea5e9; color: #fff; }
  .btn-network  { background: #10b981; color: #fff; }
  .btn-device   { background: #f59e0b; color: #fff; }
  .btn-theme    { background: #334155; color: #f1f5f9; }
  .output {
    width: 100%;
    max-width: 340px;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 14px;
    padding: 14px 16px;
    font-size: 12px;
    color: #94a3b8;
    min-height: 52px;
    line-height: 1.7;
    word-break: break-all;
  }
  .output strong { color: #818cf8; }
</style>
</head>
<body>

<div class="logo">⚡</div>
<h1>HTML2APK Studio</h1>
<p class="sub">Replace this file with your own <strong>index.html</strong> to build your app.</p>

<div class="btn-grid">
  <button class="btn-toast"   onclick="doToast()">
    <span class="icon">💬</span>Toast
  </button>
  <button class="btn-vibrate" onclick="doVibrate()">
    <span class="icon">📳</span>Vibrate
  </button>
  <button class="btn-copy"    onclick="doCopy()">
    <span class="icon">📋</span>Clipboard
  </button>
  <button class="btn-network" onclick="doNetwork()">
    <span class="icon">📶</span>Network
  </button>
  <button class="btn-device"  onclick="doDevice()">
    <span class="icon">📱</span>Device Info
  </button>
  <button class="btn-theme"   onclick="doTheme()">
    <span class="icon">🌙</span>Theme
  </button>
</div>

<div class="output" id="out">
  Tap a button to test the JS Bridge →
</div>

<script>
var dark = false;

function log(msg) {
  document.getElementById('out').innerHTML = msg;
}

function doToast() {
  if (window.H2ABridge) {
    H2ABridge.call('toast', { message: 'Hello from HTML2APK! 👋' });
    log('<strong>toast</strong> → "Hello from HTML2APK! 👋"');
  } else {
    log('<strong>toast</strong> → (only works inside APK)');
  }
}

function doVibrate() {
  if (window.H2ABridge) {
    H2ABridge.call('vibration', { duration: 300 });
    log('<strong>vibration</strong> → 300ms');
  } else {
    log('<strong>vibration</strong> → (only works inside APK)');
  }
}

function doCopy() {
  var text = 'Built with HTML2APK Studio 🚀';
  if (window.H2ABridge) {
    H2ABridge.call('clipboard', { action: 'copy', text: text }, function(r) {
      log('<strong>clipboard</strong> → copied: "' + text + '"');
    });
  } else {
    log('<strong>clipboard</strong> → (only works inside APK)');
  }
}

function doNetwork() {
  if (window.H2ABridge) {
    H2ABridge.call('network', { action: 'status' }, function(r) {
      log('<strong>network</strong> → connected: ' + r.connected + '<br>type: ' + r.type);
    });
  } else {
    log('<strong>network</strong> → (only works inside APK)');
  }
}

function doDevice() {
  if (window.H2ABridge) {
    H2ABridge.call('device', { action: 'info' }, function(r) {
      log('<strong>device</strong> → ' + r.manufacturer + ' ' + r.model + '<br>Android ' + r.version + ' (SDK ' + r.sdk + ')');
    });
  } else {
    log('<strong>device</strong> → (only works inside APK)');
  }
}

function doTheme() {
  dark = !dark;
  document.body.style.background = dark ? '#f8fafc' : '#0f172a';
  document.body.style.color      = dark ? '#0f172a' : '#f1f5f9';
  log('<strong>theme</strong> → ' + (dark ? 'light' : 'dark'));
}
</script>
</body>
</html>
